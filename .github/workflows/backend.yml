name: Deploy Backend

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read
  packages: write
  
jobs:
  backend-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::109490195201:role/GitHubActionsDeployRole
          aws-region: us-east-1
        

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          IMAGE_URI=$ACCOUNT_ID.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}

          docker build -t $IMAGE_URI ./backend
          docker push $IMAGE_URI

          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      - name: Deploy backend on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin $(echo ${{ env.IMAGE_URI }} | cut -d/ -f1)

            docker stop employee-backend || true
            docker rm employee-backend || true

            docker pull ${{ env.IMAGE_URI }}

            docker run -d \
              --name employee-backend \
              --env-file /home/ubuntu/backend-app/.env \
              -p 5001:5001 \
              ${{ env.IMAGE_URI }}